name: Add issue to project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: write
      contents: read
    steps:
      - name: Add issue to project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ACTIONS_TOKEN }}
          script: |
            const orgLogin = context.repo.owner;
            const projectNumber = 1;

            // Fetch org project ID
            const projectQuery = `
              query($login: String!, $number: Int!) {
                organization(login: $login) {
                  projectV2(number: $number) { id }
                }
              }
            `;

            const { organization } = await github.graphql(projectQuery, { login: orgLogin, number: projectNumber });
            const projectId = organization.projectV2.id;

            // Add the issue to the project
            const addMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
            `;
            await github.graphql(addMutation, {
              projectId,
              contentId: context.payload.issue.node_id
            });
            core.info("Issue added to project");
