name: CI

on:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stackiq
        ports:
          - 65432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d stackiq"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:65432/stackiq?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          for i in {1..30}; do
            if pg_isready -h localhost -p 65432 -U postgres -d stackiq; then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

          echo "PostgreSQL failed to start"
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run migrations
        run: npm run db:migrate:deploy

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Start server in background
        run: |
          nohup npm run dev &
          sleep 5

      - name: Health check
        run: curl http://localhost:4000/health

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests with coverage
        run: npm run test:coverage

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests with coverage
        run: npm run test:coverage
