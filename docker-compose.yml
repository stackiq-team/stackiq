services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BULLMQ_QUEUE_NAME: ${BULLMQ_QUEUE_NAME:-stackiq-analysis}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/src/generated
    command: sh -c "npm run db:migrate:deploy && npm run dev"

  worker:
    build: 
      context: ./worker
      dockerfile: Dockerfile.dev
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BULLMQ_QUEUE_NAME: ${BULLMQ_QUEUE_NAME:-stackiq-analysis}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_MINER_TIMEOUT_MS: ${GITHUB_MINER_TIMEOUT_MS:-20000}
      ISSUES_MINING_TIMEOUT_MS: ${ISSUES_MINING_TIMEOUT_MS:-300000}
      ISSUES_MINING_LOOKBACK_DAYS: ${ISSUES_MINING_LOOKBACK_DAYS:-60}
      ISSUES_MINING_MAX_ISSUES: ${ISSUES_MINING_MAX_ISSUES:-10}
      ISSUES_MINING_TIMELINE_ITEMS: ${ISSUES_MINING_TIMELINE_ITEMS:-15}
      ISSUES_MINING_MAX_TIMELINE_PAGES: ${ISSUES_MINING_MAX_TIMELINE_PAGES:-1}
      ISSUES_MINING_INCLUDE_DEV_DEPENDENCIES: ${ISSUES_MINING_INCLUDE_DEV_DEPENDENCIES:-false}
      DEPENDENCY_CACHE_VERSION: ${DEPENDENCY_CACHE_VERSION:-v1}
      DEPENDENCY_CACHE_TTL_DAYS: ${DEPENDENCY_CACHE_TTL_DAYS:-14}
      PARTIAL_DEPENDENCY_CACHE_TTL_DAYS: ${PARTIAL_DEPENDENCY_CACHE_TTL_DAYS:-1}
    volumes:
      - ./worker:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-stackiq}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-65432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
